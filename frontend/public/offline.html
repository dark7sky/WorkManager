<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#0078d4" />
    <title>WorkManager - 오프라인</title>
    <style>
      :root{font-family:"Segoe UI",system-ui,sans-serif;color:#182230;background:#f3f4f6;color-scheme:light dark}
      body{min-height:100vh;margin:0;display:grid;place-items:center;padding:24px;box-sizing:border-box}
      main{max-width:440px;background:Canvas;padding:32px;border:1px solid color-mix(in srgb,CanvasText 14%,transparent);border-radius:14px;box-shadow:0 16px 48px #0002}
      h1{font-size:24px;margin:0 0 12px}p{line-height:1.6;color:color-mix(in srgb,CanvasText 68%,transparent)}button{border:0;border-radius:6px;background:#0078d4;color:white;padding:11px 18px;font:inherit;font-weight:600}
    </style>
  </head>
  <body><main><h1>현재 오프라인입니다</h1><p>인터넷 연결을 확인한 뒤 다시 시도하세요. 이미 열린 화면의 데이터는 읽을 수 있지만 변경 사항은 연결 후 저장하는 것이 안전합니다.</p><button onclick="location.reload()">다시 연결</button></main></body>
</html>
