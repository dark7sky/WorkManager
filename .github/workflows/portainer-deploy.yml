name: Trigger Portainer deployment

on:
  workflow_run:
    workflows: ["Quality gates"]
    branches: [main]
    types: [completed]

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Portainer GitOps webhook
        env:
          PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          if [ -z "$PORTAINER_WEBHOOK_URL" ]; then
            echo "PORTAINER_WEBHOOK_URL is not configured; Portainer polling remains active."
            exit 0
          fi
          curl --fail --silent --show-error --retry 3 --request POST "$PORTAINER_WEBHOOK_URL"
