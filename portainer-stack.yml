services:
  api:
    build:
      context: ./backend
    environment:
      APP_SECRET: ${APP_SECRET}
      CODEX_ADMIN_TOKEN: ${CODEX_ADMIN_TOKEN:-}
      DATABASE_PATH: /data/workmanager.db
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_ALLOWED_EMAIL: ${GOOGLE_ALLOWED_EMAIL:-}
      GOOGLE_CALENDAR_HISTORY_DAYS: ${GOOGLE_CALENDAR_HISTORY_DAYS:-3650}
      LEGACY_OWNER_EMAIL: ${LEGACY_OWNER_EMAIL:-}
      GOOGLE_REDIRECT_URI: https://work.ysyoo.link/api/auth/google/callback
      FRONTEND_URL: https://work.ysyoo.link
      COOKIE_SECURE: "true"
      CORS_ORIGINS: https://work.ysyoo.link
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_MODEL: ${AI_MODEL:-gpt-5-mini}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-30}
      TZ: Asia/Seoul
    volumes:
      - workmanager_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/ready')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  backup:
    build:
      context: ./backend
    depends_on:
      api:
        condition: service_healthy
    command: ["python", "/app/scripts/backup_db.py"]
    environment:
      DATABASE_PATH: /data/workmanager.db
      BACKUP_PATH: /backups
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-21600}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - workmanager_data:/data:ro
      - workmanager_backups:/backups
    restart: unless-stopped

  web:
    build:
      context: ./frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${APP_HTTP_PORT:-18080}:80"
    restart: unless-stopped

volumes:
  workmanager_data:
  workmanager_backups:
