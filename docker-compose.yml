services:
  api:
    build: ./backend
    image: workmanager-api:local
    environment:
      APP_SECRET: ${APP_SECRET:-development-secret-change-me}
      DATABASE_PATH: /data/workmanager.db
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_ALLOWED_EMAIL: ${GOOGLE_ALLOWED_EMAIL:-}
      GOOGLE_CALENDAR_HISTORY_DAYS: ${GOOGLE_CALENDAR_HISTORY_DAYS:-3650}
      LEGACY_OWNER_EMAIL: ${LEGACY_OWNER_EMAIL:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8080/api/auth/google/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_MODEL: ${AI_MODEL:-gpt-5-mini}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-30}
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - workmanager_data:/data
    restart: unless-stopped
  backup:
    image: workmanager-api:local
    depends_on: [api]
    command: ["python", "/app/scripts/backup_db.py"]
    environment:
      DATABASE_PATH: /data/workmanager.db
      BACKUP_PATH: /backups
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-21600}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - workmanager_data:/data:ro
      - workmanager_backups:/backups
    restart: unless-stopped
  web:
    build: ./frontend
    depends_on: [api]
    ports: ["8080:80"]
    restart: unless-stopped
volumes:
  workmanager_data:
  workmanager_backups:
